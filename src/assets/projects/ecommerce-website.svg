<svg width="600" height="800" viewBox="0 0 600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#020408"/>
  
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00A3FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00A3FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background Glows -->
  <circle cx="100" cy="100" r="200" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="500" cy="200" r="150" fill="url(#glow)" filter="url(#blur)" fill-opacity="0.5"/>

  <!-- Main Perspective Circles (Ellipses) -->
  <ellipse cx="300" cy="400" rx="280" ry="220" stroke="#00A3FF" stroke-width="0.5" stroke-opacity="0.2"/>
  <ellipse cx="300" cy="400" rx="200" ry="150" stroke="#00A3FF" stroke-width="1" stroke-opacity="0.1"/>
  
  <!-- Connecting Lines -->
  <path d="M120 400 Q 300 350 480 400" stroke="#00A3FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <path d="M300 220 Q 250 400 300 580" stroke="#00A3FF" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Nodes with Shopping Carts -->
  <!-- Top Node -->
  <g transform="translate(300, 220) scale(0.9)">
    <circle r="45" stroke="#00A3FF" stroke-width="1.5" fill="#020408" fill-opacity="0.8"/>
    <circle r="50" stroke="#00A3FF" stroke-width="0.5" stroke-opacity="0.2"/>
    <path d="M-18 -12 H8 L12 12 H-14 L-18 -12 Z M-14 18 A2.5 2.5 0 1 0 -14 19 A2.5 2.5 0 1 0 -14 18 Z M8 18 A2.5 2.5 0 1 0 8 19 A2.5 2.5 0 1 0 8 18 Z" fill="#00A3FF"/>
    <path d="M-5 -22 L0 -17 L5 -22" stroke="#00A3FF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bottom Node -->
  <g transform="translate(300, 580) scale(0.9)">
    <circle r="45" stroke="#00A3FF" stroke-width="1.5" fill="#020408" fill-opacity="0.8"/>
    <circle r="50" stroke="#00A3FF" stroke-width="0.5" stroke-opacity="0.2"/>
    <path d="M-18 -12 H8 L12 12 H-14 L-18 -12 Z M-14 18 A2.5 2.5 0 1 0 -14 19 A2.5 2.5 0 1 0 -14 18 Z M8 18 A2.5 2.5 0 1 0 8 19 A2.5 2.5 0 1 0 8 18 Z" fill="#00A3FF"/>
  </g>

  <!-- Central Branding -->
  <g transform="translate(300, 400)">
    <rect x="-140" y="-30" width="280" height="60" rx="30" stroke="#00A3FF" stroke-width="2" fill="#020408" style="filter: drop-shadow(0 0 15px rgba(0,163,255,0.6))"/>
    <text y="10" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="32" fill="white" letter-spacing="3">E-COMMERCE</text>
  </g>

  <!-- Decorative technical elements -->
  <path d="M450 350 A 100 100 0 0 1 550 450" stroke="#00A3FF" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="550" cy="450" r="3" fill="#00A3FF"/>
  
  <path d="M150 450 A 100 100 0 0 1 50 350" stroke="#00A3FF" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="50" cy="350" r="3" fill="#00A3FF"/>
</svg>
